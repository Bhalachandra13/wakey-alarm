name: EAS Build Android

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'

      - name: Install system deps
        run: |
          sudo apt-get update && sudo apt-get install -y jq

      - name: Install frontend dependencies (CI)
        run: |
          cd frontend
          echo 'Installing frontend dependencies...'
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund || (echo 'npm ci failed; removing package-lock.json and trying npm install' && rm -f package-lock.json && npm install --legacy-peer-deps --no-audit --no-fund)
          else
            npm install --legacy-peer-deps --no-audit --no-fund
          fi

      - name: Skip installing EAS CLI (use npx)
        run: |
          echo "Using npx eas-cli@latest for init/build to ensure latest CLI and avoid global install"

      - name: Validate EXPO_TOKEN
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -z "${EXPO_TOKEN}" ]; then echo "ERROR: EXPO_TOKEN secret is not set"; exit 1; fi
          echo "EXPO_TOKEN provided — using token-based auth for EAS commands."
          # Print current account (may be unauthenticated if token invalid); do not fail the workflow on whoami
          npx eas-cli@latest whoami || true

      - name: Show frontend files and EAS auth (debug)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          echo '--- listing frontend ---'
          ls -la frontend || true
          echo '--- package.json ---'
          cat frontend/package.json || true
          echo '--- eas.json ---'
          cat frontend/eas.json || true
          echo '--- whoami ---'
          npx eas-cli@latest whoami || true
          echo '--- node version ---'
          node -v || true
          echo '--- npm version ---'
          npm -v || true

      - name: Ensure EAS project configured
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          cd frontend
          echo "Ensuring EAS project is linked"
          npx eas-cli@latest init --non-interactive --id "c3a3cb6d-c4d7-4fd2-a9c0-2f0843766f42" || (echo "eas init failed; listing .eas" && ls -la .eas || true && cat .eas/config.json || true)

      - name: Start EAS build (Android)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EAS_BUILD_NO_EXPO_GO_WARNING: true
        run: |
          cd frontend
          # Run build and save metadata as JSON (non-interactive). This blocks until build completes.
          npx eas-cli@latest build --platform android --non-interactive --profile production --json > build.json

      - name: Download built APK (if available)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          cd frontend
          if [ -f build.json ]; then
            BUILD_ID=$(jq -r '.id' build.json || echo "")
            echo "Build ID: $BUILD_ID"
            if [ -n "$BUILD_ID" ] && [ "$BUILD_ID" != "null" ]; then
              # Download the APK to the runner
              npx eas-cli@latest build:download --platform android --id "$BUILD_ID" --output ./build.apk || echo "Download failed or not available"
            else
              echo "No build id found in build.json"
            fi
          else
            echo "build.json not found, skipping download"
          fi

      - name: Upload EAS build metadata
        uses: actions/upload-artifact@v4
        with:
          name: eas-build-metadata
          path: frontend/build.json

      - name: Upload EAS APK (if present)
        uses: actions/upload-artifact@v4
        with:
          name: eas-apk
          path: frontend/build.apk

      - name: Show build metadata
        if: always()
        run: |
          echo "--- build.json ---"
          jq . frontend/build.json || cat frontend/build.json || true

      - name: Finish
        run: echo "EAS build completed or triggered. Downloaded APK (if available) is uploaded as artifact 'eas-apk'."
