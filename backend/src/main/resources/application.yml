spring:
  application:
    name: wakey
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.spatial.dialect.postgis.PostgisPG95Dialect
        enable_lazy_load_no_trans: true
  
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/wakey}
    username: ${POSTGRES_USER:wakey_user}
    password: ${POSTGRES_PASSWORD:wakey_password}
    driver-class-name: org.postgresql.Driver
  
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
  
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:wakey_user}
    password: ${RABBITMQ_PASSWORD:wakey_password}
  
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080
  servlet:
    context-path: /
  compression:
    enabled: true

jwt:
  secret: ${JWT_SECRET:your_secret_key_change_in_production}
  expiration:
    access: 900000  # 15 minutes in milliseconds
    refresh: 2592000000  # 30 days in milliseconds

logging:
  level:
    root: INFO
    com.wakey: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      show-details: always
